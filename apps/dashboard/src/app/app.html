<div class="flex flex-col h-screen overflow-hidden">
  @if (!isAuthRoute() && !layout.isFullscreen()) {
    <app-header>
      <app-user-chip />
    </app-header>

    <app-tab-nav
      [mobileMenuOpen]="mobileMenuOpen()"
      (mobileMenuToggle)="mobileMenuOpen.set(!mobileMenuOpen())"
    />
  }

  <main
    class="flex-1 overflow-y-auto"
    [class.bg-base-200]="!isAuthRoute() && !layout.isFullscreen()"
    [class.p-4]="!isAuthRoute() && !layout.isFullscreen()"
    [class.lg:p-6]="!isAuthRoute() && !layout.isFullscreen()"
  >
    <router-outlet />
  </main>
</div>

<app-toast />
