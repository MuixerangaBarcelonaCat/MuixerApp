@if (isAuthRoute()) {
  <router-outlet />
} @else if (layout.isFullscreen()) {
  <router-outlet />
} @else {
  <div class="flex flex-col h-screen overflow-hidden">
    <app-header>
      <app-user-chip />
    </app-header>

    <app-tab-nav
      [mobileMenuOpen]="mobileMenuOpen()"
      (mobileMenuToggle)="mobileMenuOpen.set(!mobileMenuOpen())"
    />

    <main class="flex-1 overflow-y-auto bg-base-200 p-4 lg:p-6">
      <router-outlet />
    </main>
  </div>
}

<app-toast />
