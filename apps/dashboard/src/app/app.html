<div class="drawer lg:drawer-open">
  <input id="main-drawer" type="checkbox" class="drawer-toggle" [checked]="mobileMenuOpen()" />
  
  <div class="drawer-content flex flex-col">
    <!-- Header -->
    <app-header (menuClicked)="mobileMenuOpen.set(true)" />
    
    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6 bg-base-200">
      <router-outlet />
    </main>
  </div>
  
  <div class="drawer-side">
    <label 
      for="main-drawer" 
      class="drawer-overlay" 
      (click)="mobileMenuOpen.set(false)"
      (keydown.enter)="mobileMenuOpen.set(false)"
      (keydown.space)="mobileMenuOpen.set(false)"
      tabindex="0"
      role="button"
      aria-label="Tancar menú lateral">
    </label>
    <div class="w-64 min-h-full bg-base-100">
      <app-sidebar (linkClicked)="mobileMenuOpen.set(false)" />
    </div>
  </div>
</div>
