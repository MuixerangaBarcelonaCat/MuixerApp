<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card w-full max-w-sm bg-base-100 shadow-xl">
    <div class="card-body gap-6">

      <div class="text-center">
        <h1 class="text-2xl font-bold text-base-content">MuixerApp</h1>
        <p class="text-sm text-base-content/60 mt-1">Panel de gestió</p>
      </div>

      @if (errorMessage()) {
        <div class="alert alert-error">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium">Correu electrònic</span>
          </div>
          <input
            type="email"
            formControlName="email"
            placeholder="nom@exemple.cat"
            class="input input-bordered w-full"
            [class.input-error]="form.controls.email.invalid && form.controls.email.touched"
            autocomplete="email"
          />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <div class="label">
              <span class="label-text-alt text-error">Introdueix un correu vàlid</span>
            </div>
          }
        </label>

        <label class="form-control w-full">
          <div class="label">
            <span class="label-text font-medium">Contrasenya</span>
          </div>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="input input-bordered w-full"
            [class.input-error]="form.controls.password.invalid && form.controls.password.touched"
            autocomplete="current-password"
          />
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <div class="label">
              <span class="label-text-alt text-error">La contrasenya és obligatòria</span>
            </div>
          }
        </label>

        <button
          type="submit"
          class="btn btn-primary w-full mt-2"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span class="loading loading-spinner loading-sm"></span>
            Entrant...
          } @else {
            Entrar
          }
        </button>

      </form>

    </div>
  </div>
</div>
