<div class="absolute top-4 left-1/2 -translate-x-1/2 pointer-events-none select-none">
  <span class="text-2xl font-bold text-base-content opacity-80 tracking-tight">
    Edició de rengles
  </span>
</div>
<!-- SVG overlay that tracks the Konva canvas zoom/pan -->
<svg
  class="absolute inset-0 w-full h-full pointer-events-none"
  aria-hidden="true"
>
  <!-- Existing rengla connection lines -->
  @for (line of renglaLines(); track line.rengla.id) {
    @if (line.points.length >= 2) {
      <polyline
        class="pointer-events-auto cursor-pointer"
        [attr.points]="toPolylinePoints(line.points)"
        [attr.stroke]="line.color"
        stroke-width="2.5"
        stroke-dasharray="8 4"
        fill="none"
        [attr.opacity]="selectedRenglaId() === line.rengla.id ? 1 : 0.6"
        (click)="onRenglaLineClick(line.rengla.id)"
      />
    }

    <!-- Hit areas on assigned nodes so the whole node body is clickable -->
    @for (pt of line.points; track pt.id) {
      <rect
        class="pointer-events-auto cursor-pointer"
        [attr.transform]="'rotate(' + pt.rotation + ' ' + pt.cx + ' ' + pt.cy + ')'"
        [attr.x]="pt.cx - pt.width / 2"
        [attr.y]="pt.cy - pt.height / 2"
        [attr.width]="pt.width"
        [attr.height]="pt.height"
        fill="transparent"
        stroke="transparent"
        (click)="onNodeClick(pt.id)"
      />
    }

    <!-- Position badges on assigned nodes -->
    @for (pt of line.points; track pt.id) {
      <g
        class="pointer-events-auto cursor-pointer"
        [attr.transform]="'rotate(' + pt.rotation + ' ' + pt.cx + ' ' + pt.cy + ')'"
        (click)="onNodeClick(pt.id)"
      >
        <circle
          [attr.cx]="pt.cx + pt.width / 2 - 4"
          [attr.cy]="pt.cy - pt.height / 2 + 4"
          r="12"
          [attr.fill]="line.color"
          stroke="white"
          stroke-width="1.5"
        />
        <text
          [attr.x]="pt.cx + pt.width / 2 - 4"
          [attr.y]="pt.cy - pt.height / 2 + 4"
          text-anchor="middle"
          dominant-baseline="central"
          fill="white"
          font-size="11"
          font-weight="bold"
          font-family="Inter, sans-serif"
          class="select-none"
        >{{ pt.renglaPosition }}</text>
      </g>
    }
  }

  <!-- Pending creation line -->
  @if (pendingLine()) {
    <polyline
      [attr.points]="pendingLine()"
      stroke="#6366f1"
      stroke-width="3"
      fill="none"
      opacity="0.8"
    />
  }

  <!-- Pending creation badges -->
  @for (nodeId of pendingNodeIds(); track nodeId; let i = $index) {
    @if (screenNodeById(nodeId); as sn) {
      <g [attr.transform]="'rotate(' + sn.rotation + ' ' + sn.cx + ' ' + sn.cy + ')'">
        <circle
          [attr.cx]="sn.cx + sn.width / 2 - 4"
          [attr.cy]="sn.cy - sn.height / 2 + 4"
          r="13"
          fill="#6366f1"
          stroke="white"
          stroke-width="2"
        />
        <text
          [attr.x]="sn.cx + sn.width / 2 - 4"
          [attr.y]="sn.cy - sn.height / 2 + 4"
          text-anchor="middle"
          dominant-baseline="central"
          fill="white"
          font-size="11"
          font-weight="bold"
          font-family="Inter, sans-serif"
          class="select-none"
        >{{ i + 1 }}</text>
      </g>
    }
  }

  <!-- Clickable hit areas on eligible nodes -->
  @for (sn of screenNodes(); track sn.id) {
    @if (!assignedNodeIds().has(sn.id) && !isNodePending(sn.id)) {
      <rect
        class="pointer-events-auto cursor-pointer"
        [attr.transform]="'rotate(' + sn.rotation + ' ' + sn.cx + ' ' + sn.cy + ')'"
        [attr.x]="sn.cx - sn.width / 2"
        [attr.y]="sn.cy - sn.height / 2"
        [attr.width]="sn.width"
        [attr.height]="sn.height"
        fill="transparent"
        [attr.stroke]="creatingRengla() ? '#6366f1' : 'transparent'"
        stroke-width="1.5"
        stroke-dasharray="4 3"
        [attr.opacity]="creatingRengla() ? 0.4 : 0"
        rx="3"
        (click)="onNodeClick(sn.id)"
      />
    }
  }

  <!-- Selection highlight ring -->
  @for (line of renglaLines(); track line.rengla.id) {
    @if (selectedRenglaId() === line.rengla.id) {
      @for (pt of line.points; track pt.id) {
        <rect
          [attr.transform]="'rotate(' + pt.rotation + ' ' + pt.cx + ' ' + pt.cy + ')'"
          [attr.x]="pt.cx - pt.width / 2 - 3"
          [attr.y]="pt.cy - pt.height / 2 - 3"
          [attr.width]="pt.width + 6"
          [attr.height]="pt.height + 6"
          fill="none"
          [attr.stroke]="line.color"
          stroke-width="2"
          stroke-dasharray="6 3"
          rx="5"
          opacity="0.7"
        />
      }
    }
  }
</svg>

<!-- Action bar (floating bottom) -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 pointer-events-auto">
  @if (creatingRengla()) {
    <div class="flex items-center gap-2 bg-base-100 shadow-lg rounded-box px-4 py-2 border border-base-300">
      <span class="text-sm text-base-content/70">
        @if (pendingNodeIds().length === 0) {
          Feu clic als nodes per ordre (del centre cap enfora)
        } @else {
          {{ pendingNodeIds().length }} nodes seleccionats
        }
      </span>
      <button
        type="button"
        class="btn btn-primary btn-sm"
        [disabled]="pendingNodeIds().length < 1"
        (click)="finishCreating()"
        aria-label="Finalitzar creació de rengla"
      >
        Finalitzar
      </button>
      <button
        type="button"
        class="btn btn-ghost btn-sm"
        (click)="cancelCreate()"
        aria-label="Cancel·lar creació de rengla"
      >
        Cancel·lar
      </button>
    </div>
  } @else if (selectedRengla(); as sel) {
    <div class="flex items-center gap-2 bg-base-100 shadow-lg rounded-box px-4 py-2 border border-base-300">
      <span class="text-sm font-medium">{{ sel.name }}</span>
      <button
        type="button"
        class="btn btn-ghost btn-sm text-error"
        (click)="deleteSelectedRengla()"
        aria-label="Suprimir rengla"
      >
        <lucide-icon name="Trash2" [size]="14" aria-hidden="true" />
        Suprimir
      </button>
      <button
        type="button"
        class="btn btn-ghost btn-sm"
        (click)="selectedRenglaId.set(null)"
        aria-label="Tancar selecció"
      >
        <lucide-icon name="X" [size]="14" aria-hidden="true" />
      </button>
    </div>
  } @else {
    <button
      type="button"
      class="btn btn-primary btn-sm shadow-lg pointer-events-auto"
      (click)="startCreating()"
      aria-label="Crea rengla nova"
    >
      <lucide-icon name="Plus" [size]="14" aria-hidden="true" />
      Rengla nova
    </button>
  }
</div>
